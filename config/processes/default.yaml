- name: inject_dataset_tag
  type: add_fields
  enabled: true
  params:
    fields:
      dataset: ego_demo

- name: write_metadata
  type: write_metadata_json
  enabled: true
  params:
    output_dir: ./workspace/metadata
    suffix: .meta
    extension: .json
    include_keys:
      - sample_id
      - input_path
      - relative_path
      - dataset
    indent: 2

- name: copy_media
  type: copy_input_file
  enabled: true
  params:
    output_dir: ./workspace/media
