- name: render_filter
  type: render_filter
  enabled: true
  params:
    reachable_ratio_threshold: 0.9
    collision_ratio_threshold: 0.05

- name: render
  type: render
  enabled: true
  params:
    output_dir: &render_output_dir
      local: ./outputs
      remote: ./outputs
    urdf_path: ./assets/aloha_new_description/urdf/dual_piper.urdf
    target_short_side: 512
    genesis_backend: cpu
    default_fov_deg: 55.0
    camera_near: 0.001
    camera_far: 10.0
    render_height: null
    render_width: null
    render_relative_dir: render
    render_meta_relative_path: render_meta.json
