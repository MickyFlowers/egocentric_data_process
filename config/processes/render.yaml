- name: render_filter
  type: render_filter
  enabled: true
  params:
    reachable_ratio_threshold: 0.0
    collision_ratio_threshold: 0.05
    missing_reachable_ratio_default: 1.0

- name: render
  type: render
  enabled: true
  params:
    output_dir: &render_output_dir
      local: ./outputs
      remote: ./outputs
    urdf_path: ./assets/aloha_new_description/urdf/dual_piper.urdf
    target_short_side: 512
    genesis_backend: cpu
    default_fov_deg: 55.0
    camera_near: 0.001
    camera_far: 10.0
    randomize_clip_light: false
    light_seed: 0
    ambient_light: [0.08, 0.08, 0.08]
    clip_light_xy_range: [0.16, 0.12]
    clip_light_height_range: [0.20, 0.34]
    clip_light_intensity_range: [18.0, 30.0]
    render_height: null
    render_width: null
    render_relative_dir: render
    render_meta_relative_path: render_meta.json
